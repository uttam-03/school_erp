version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: school_erp_db
    restart: always
    environment:
      MYSQL_DATABASE: school_erp
      MYSQL_USER: school_user
      MYSQL_PASSWORD: school_password
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: school_erp_redis
    restart: always
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: school_erp_web
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - .:/app
      - media_files:/app/media
      - static_files:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0

  nginx:
    image: nginx:alpine
    container_name: school_erp_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - media_files:/app/media
      - static_files:/app/staticfiles
    depends_on:
      - web

volumes:
  mysql_data:
  media_files:
  static_files:
