<!DOCTYPE html>
<html lang="en" data-theme="light">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pending Approval — EduCore</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css">
</head>
<body style="background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:var(--font-body)">
<div class="text-center" style="max-width:440px;padding:40px">
  <div style="width:80px;height:80px;border-radius:50%;background:rgba(245,158,11,0.1);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:36px">⏳</div>
  <h2 style="font-family:var(--font-display);font-weight:700;margin-bottom:12px">Account Pending Approval</h2>
  <p class="text-muted mb-4" style="font-size:15px;line-height:1.7">Your account has been created successfully. An administrator will review and approve your account shortly. You'll be able to log in once approved.</p>
  <div class="card mb-4" style="background:rgba(245,158,11,0.06);border-color:rgba(245,158,11,0.2)">
    <div class="card-body">
      <div class="fw-600 mb-1">{{ user.get_full_name }}</div>
      <div class="text-muted" style="font-size:13px">{{ user.email }}</div>
      <div class="mt-2"><span class="badge-role-{{ user.role }} sidebar-role">{{ user.get_role_display }}</span></div>
    </div>
  </div>
  <form method="post" action="{% url 'accounts:logout' %}">
    {% csrf_token %}
    <button type="submit" class="btn btn-outline-secondary"><i class="bi bi-box-arrow-left me-2"></i>Logout</button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
