<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — EduCore ERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    body { font-family: var(--font-body); background: var(--bg); min-height: 100vh; display: flex; }
    .auth-wrapper { display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; width: 100%; }
    .auth-panel {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #312e81 100%);
      display: flex; flex-direction: column; justify-content: center;
      align-items: center; padding: 60px 48px; position: relative;
    }
    .auth-panel-logo { display:flex; align-items:center; gap:14px; margin-bottom:48px; }
    .auth-panel-logo .logo-icon { width:56px; height:56px; background:linear-gradient(135deg,#6366f1,#8b5cf6); border-radius:16px; display:flex; align-items:center; justify-content:center; }
    .auth-panel-title { font-family:var(--font-display); font-size:42px; font-weight:700; color:white; margin-bottom:16px; }
    .auth-panel-sub { color:rgba(255,255,255,0.6); font-size:16px; line-height:1.6; max-width:320px; text-align:center; }
    .auth-form-panel { display:flex; flex-direction:column; justify-content:center; align-items:center; padding:60px 48px; background:var(--surface); }
    .auth-form-box { width:100%; max-width:400px; }
    @media(max-width:768px) { .auth-panel{ display:none; } .auth-wrapper{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-panel">
    <div class="auth-panel-logo">
      <div class="logo-icon"><i class="bi bi-mortarboard-fill text-white fs-4"></i></div>
      <span style="font-family:var(--font-display);font-size:28px;font-weight:700;color:white">EduCore</span>
    </div>
    <h2 class="auth-panel-title">School ERP</h2>
    <p class="auth-panel-sub">Complete school management — students, teachers, attendance, exams & more.</p>
  </div>
  <div class="auth-form-panel">
    <div class="auth-form-box">

      <div class="text-center mb-4">
        <div style="width:60px;height:60px;background:linear-gradient(135deg,#22c55e,#16a34a);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
          <i class="bi bi-lock-fill text-white fs-4"></i>
        </div>
        <h4 class="fw-bold">Set New Password</h4>
        <p class="text-muted" style="font-size:14px">Choose a strong password for your account</p>
      </div>
      {% if messages %}{% for m in messages %}<div class="alert alert-danger py-2 mb-3">{{ m }}</div>{% endfor %}{% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-600">New Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password1" class="form-control" placeholder="Min. 6 characters" required minlength="6">
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-600">Confirm Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" name="password2" class="form-control" placeholder="Repeat new password" required minlength="6">
          </div>
        </div>
        <button type="submit" class="btn btn-success w-100 fw-semibold" style="height:48px">
          <i class="bi bi-check2-all me-2"></i>Reset Password
        </button>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
