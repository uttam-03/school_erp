{% extends 'shared/base.html' %}
{% block title %}{{ page_title }}{% endblock %}
{% block content %}
<div class="page-header">
  <div class="d-flex align-items-center gap-3">
    <a href="{% url 'subjects:index' %}" class="btn btn-icon"><i class="bi bi-arrow-left"></i></a>
    <h3 class="mb-0">{{ page_title }}</h3>
  </div>
</div>
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-header"><h6 class="card-title">Subject Details</h6></div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-md-8"><label class="form-label">Subject Name *</label><input type="text" name="name" class="form-control" required placeholder="e.g. Mathematics" value="{% if subject %}{{ subject.name }}{% endif %}"></div>
            <div class="col-md-4"><label class="form-label">Subject Code *</label><input type="text" name="code" class="form-control" required placeholder="e.g. MATH101" value="{% if subject %}{{ subject.code }}{% endif %}"></div>
            <div class="col-12"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="3" placeholder="Brief description of the subject...">{% if subject %}{{ subject.description }}{% endif %}</textarea></div>
            <div class="col-md-6"><label class="form-label">Maximum Marks</label><input type="number" name="max_marks" class="form-control" value="{% if subject %}{{ subject.max_marks }}{% else %}100{% endif %}"></div>
            <div class="col-md-6"><label class="form-label">Passing Marks</label><input type="number" name="passing_marks" class="form-control" value="{% if subject %}{{ subject.passing_marks }}{% else %}35{% endif %}"></div>
            <div class="col-12">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" name="is_elective" id="isElective" {% if subject and subject.is_elective %}checked{% endif %}>
                <label class="form-check-label" for="isElective">This is an elective subject</label>
              </div>
            </div>
            <div class="col-12 d-flex gap-2">
              <button type="submit" class="btn btn-primary"><i class="bi bi-check2 me-1"></i>{% if action == 'create' %}Create Subject{% else %}Update Subject{% endif %}</button>
              <a href="{% url 'subjects:index' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
