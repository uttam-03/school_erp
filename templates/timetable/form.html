{% extends 'shared/base.html' %}
{% block title %}{{ page_title }}{% endblock %}
{% block content %}
<div class="page-header">
  <div class="d-flex align-items-center gap-3">
    <a href="{% url 'timetable:index' %}" class="btn btn-icon"><i class="bi bi-arrow-left"></i></a>
    <h3 class="mb-0">{{ page_title }}</h3>
  </div>
</div>
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-header"><h6 class="card-title">Timetable Entry</h6></div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Class *</label>
              <select name="academic_class" class="form-select" required>
                <option value="">Select Class</option>
                {% for cls in classes %}<option value="{{ cls.pk }}" {% if entry and entry.academic_class_id == cls.pk %}selected{% endif %}>{{ cls }}</option>{% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Day *</label>
              <select name="day" class="form-select" required>
                {% for val, label in days %}<option value="{{ val }}" {% if entry and entry.day == val %}selected{% endif %}>{{ label }}</option>{% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Time Slot *</label>
              <select name="time_slot" class="form-select" required>
                <option value="">Select Slot</option>
                {% for slot in time_slots %}<option value="{{ slot.pk }}" {% if entry and entry.time_slot_id == slot.pk %}selected{% endif %}>{{ slot.name }} ({{ slot.start_time|time:"H:i" }}–{{ slot.end_time|time:"H:i" }})</option>{% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Subject *</label>
              <select name="subject" class="form-select" required>
                <option value="">Select Subject</option>
                {% for sub in subjects %}<option value="{{ sub.pk }}" {% if entry and entry.subject_id == sub.pk %}selected{% endif %}>{{ sub.name }}</option>{% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Teacher *</label>
              <select name="teacher" class="form-select" required>
                <option value="">Select Teacher</option>
                {% for t in teachers %}<option value="{{ t.pk }}" {% if entry and entry.teacher_id == t.pk %}selected{% endif %}>{{ t.user.get_full_name }}</option>{% endfor %}
              </select>
            </div>
            <div class="col-md-3"><label class="form-label">Room</label><input type="text" name="room" class="form-control" placeholder="e.g. 101" value="{% if entry %}{{ entry.room }}{% endif %}"></div>
            <div class="col-md-3"><label class="form-label">Academic Year</label><input type="text" name="academic_year" class="form-control" placeholder="2024-25" value="{% if entry %}{{ entry.academic_year }}{% endif %}"></div>
            <div class="col-12 d-flex gap-2">
              <button type="submit" class="btn btn-primary"><i class="bi bi-check2 me-1"></i>Save Entry</button>
              <a href="{% url 'timetable:index' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
