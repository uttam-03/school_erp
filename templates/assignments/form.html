{% extends 'shared/base.html' %}
{% block title %}{{ page_title }}{% endblock %}
{% block content %}
<div class="page-header">
  <div class="d-flex align-items-center gap-3">
    <a href="{% url 'assignments:index' %}" class="btn btn-icon"><i class="bi bi-arrow-left"></i></a>
    <h3 class="mb-0">{{ page_title }}</h3>
  </div>
</div>
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card">
      <div class="card-header"><h6 class="card-title">Assignment Details</h6></div>
      <div class="card-body">
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-12"><label class="form-label">Title *</label><input type="text" name="title" class="form-control" required value="{% if assignment %}{{ assignment.title }}{% endif %}" placeholder="Assignment title"></div>
            <div class="col-12"><label class="form-label">Description *</label><textarea name="description" class="form-control" rows="5" required placeholder="Describe the assignment...">{% if assignment %}{{ assignment.description }}{% endif %}</textarea></div>
            {% if action == 'create' %}
            <div class="col-md-6">
              <label class="form-label">Subject *</label>
              <select name="subject" class="form-select" required>
                <option value="">Select Subject</option>
                {% for sub in subjects %}<option value="{{ sub.pk }}">{{ sub.name }}</option>{% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Class *</label>
              <select name="assigned_class" class="form-select" required>
                <option value="">Select Class</option>
                {% for cls in classes %}<option value="{{ cls.pk }}">{{ cls }}</option>{% endfor %}
              </select>
            </div>
            {% endif %}
            <div class="col-md-6"><label class="form-label">Due Date *</label><input type="datetime-local" name="due_date" class="form-control" required value="{% if assignment %}{{ assignment.due_date|date:'Y-m-d' }}T{{ assignment.due_date|date:'H:i' }}{% endif %}"></div>
            <div class="col-md-6"><label class="form-label">Max Marks</label><input type="number" name="max_marks" class="form-control" value="{% if assignment %}{{ assignment.max_marks }}{% else %}100{% endif %}"></div>
            <div class="col-12"><label class="form-label">Attachment (optional)</label><input type="file" name="file" class="form-control"></div>
            <div class="col-12 d-flex gap-2">
              <button type="submit" class="btn btn-primary"><i class="bi bi-check2 me-1"></i>{% if action == 'create' %}Create Assignment{% else %}Update Assignment{% endif %}</button>
              <a href="{% url 'assignments:index' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
