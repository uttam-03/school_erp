{% extends 'shared/base.html' %}
{% block title %}Post Announcement{% endblock %}
{% block content %}
<div class="page-header">
  <div class="d-flex align-items-center gap-3">
    <a href="{% url 'notifications:announcements' %}" class="btn btn-icon"><i class="bi bi-arrow-left"></i></a>
    <h3 class="mb-0">Post Announcement</h3>
  </div>
</div>
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card">
      <div class="card-header"><h6 class="card-title">Announcement Details</h6></div>
      <div class="card-body">
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-12"><label class="form-label">Title *</label><input type="text" name="title" class="form-control" required placeholder="Announcement title"></div>
            <div class="col-12"><label class="form-label">Content *</label><textarea name="content" class="form-control" rows="6" required placeholder="Write your announcement here..."></textarea></div>
            <div class="col-md-6">
              <label class="form-label">Audience</label>
              <select name="audience" class="form-select">
                <option value="all">Everyone</option>
                <option value="students">Students Only</option>
                <option value="teachers">Teachers Only</option>
                <option value="admin">Admin Only</option>
              </select>
            </div>
            <div class="col-md-6"><label class="form-label">Expires At (optional)</label><input type="datetime-local" name="expires_at" class="form-control"></div>
            <div class="col-md-6"><label class="form-label">Attachment (optional)</label><input type="file" name="attachment" class="form-control"></div>
            <div class="col-md-6">
              <label class="form-label">&nbsp;</label>
              <div class="form-check mt-2">
                <input class="form-check-input" type="checkbox" name="is_pinned" id="isPinned">
                <label class="form-check-label" for="isPinned"><i class="bi bi-pin-fill text-warning me-1"></i>Pin this announcement</label>
              </div>
            </div>
            <div class="col-12 d-flex gap-2">
              <button type="submit" class="btn btn-primary"><i class="bi bi-megaphone me-1"></i>Post Announcement</button>
              <a href="{% url 'notifications:announcements' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
